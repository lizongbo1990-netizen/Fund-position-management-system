<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f5f5f5; }
        .sidebar { width: 220px; background: #2c3e50; min-height: 100vh; position: fixed; padding-top: 20px; }
        .sidebar a { display: block; padding: 12px 20px; color: #fff; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar a:hover, .sidebar a.active { background: #34495e; border-left-color: #3498db; }
        .sidebar a i { margin-right: 10px; width: 20px; }
        .main { margin-left: 220px; padding: 20px; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .card-header { padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: 600; }
        .card-body { padding: 20px; }
        .nav-tabs { border-bottom: 2px solid #dee2e6; }
        .nav-tabs .nav-link { border: none; padding: 12px 20px; color: #666; }
        .nav-tabs .nav-link.active { color: #3498db; border-bottom: 2px solid #3498db; }
        .table th { background: #f8f9fa; font-weight: 600; }
        .btn-danger { padding: 4px 12px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="#" class="active" onclick="showSection('users')"><i class="fas fa-users"></i>用户管理</a>
        <a href="#" onclick="showSection('settings')"><i class="fas fa-cog"></i>网站设置</a>
        <a href="/admin/logout" style="margin-top: 50px;"><i class="fas fa-sign-out-alt"></i>退出登录</a>
    </div>

    <div class="main">
        <h4 class="mb-4">管理后台</h4>

        <div id="usersSection">
            <div class="card">
                <div class="card-header">用户列表</div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="settingsSection" style="display: none;">
            <div class="card">
                <div class="card-header">网站设置</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">网站名称</label>
                        <input type="text" class="form-control" id="siteNameInput" style="max-width: 400px;">
                    </div>
                    <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const res = await fetch('/admin/api/users');
            const data = await res.json();
            if (data.code === 0) {
                document.getElementById('userTable').innerHTML = data.data.map(user => `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.created_at || '-'}</td>
                        <td>
                            ${user.username !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">注销</button>` : '<span class="text-muted">-</span>'}
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function deleteUser(id) {
            if (!confirm('确定要注销该用户吗？此操作将删除该用户的所有持仓数据！')) return;
            const res = await fetch(`/admin/api/users/${id}`, {method: 'DELETE'});
            const data = await res.json();
            if (data.code === 0) {
                alert('删除成功');
                loadUsers();
            } else {
                alert(data.msg || '删除失败');
            }
        }

        async function loadSettings() {
            const res = await fetch('/admin/api/settings');
            const data = await res.json();
            if (data.code === 0) {
                document.getElementById('siteNameInput').value = data.data.site_name || '基金持仓管理系统';
            }
        }

        async function saveSettings() {
            const site_name = document.getElementById('siteNameInput').value;
            const res = await fetch('/admin/api/settings', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({site_name})
            });
            const data = await res.json();
            alert(data.msg || '保存成功');
        }

        function showSection(section) {
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('usersSection').style.display = section === 'users' ? 'block' : 'none';
            document.getElementById('settingsSection').style.display = section === 'settings' ? 'block' : 'none';

            if (section === 'users') loadUsers();
            if (section === 'settings') loadSettings();
        }

        loadUsers();
    </script>
</body>
</html>
